name: "[One-time] Extractor accuracy test"

# REMOVE THIS WORKFLOW once you confirm the accuracy test passes.
#
# Purpose: Run the live Claude accuracy test against 15 ground-truth meals.
#          Asserts ≥90% recall of expected ingredient names across 155 total
#          expected ingredients. Results are printed per-recipe in the job log.
#
# Usage:
#   1. Go to Actions → "[One-time] Extractor accuracy test"
#   2. Click "Run workflow"
#   3. Select branch: claude/review-readme-XIbsr
#   4. Click "Run workflow"
#   5. Check the job log for per-recipe recall and overall result.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Anthropic API key with sufficient credits

on:
  workflow_dispatch:

jobs:
  accuracy-test:
    name: Run live extractor accuracy test
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Anthropic API key
        run: |
          python - <<'EOF'
          import sys, os
          key = os.environ.get("ANTHROPIC_API_KEY", "")
          if not key:
              print("ERROR: ANTHROPIC_API_KEY secret is not configured.")
              sys.exit(1)
          print(f"ANTHROPIC_API_KEY present ({len(key)} chars).")
          EOF

      - name: Run accuracy test
        run: |
          pytest tests/test_extractor_accuracy.py -v -s \
            --tb=short \
            -k "accuracy or deduplication"
