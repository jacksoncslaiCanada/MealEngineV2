name: Weekly Pipeline

# Runs every Sunday at 08:00 UTC.
# Can also be triggered manually from the Actions tab for testing.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL     — PostgreSQL connection string
#   YOUTUBE_API_KEY  — YouTube Data API v3 key
#
# Notes:
#   - Reddit uses the public JSON API (no credentials needed), but GitHub
#     runner IPs are occasionally blocked by Reddit's CDN.  The pipeline
#     handles Reddit failures gracefully and continues; errors are surfaced
#     in the report and the job still exits with code 1 so the run is flagged.
#   - The pipeline exits 0 only if all four steps complete without error.

on:
  schedule:
    - cron: "0 8 * * 0"   # Sunday 08:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  pipeline:
    name: Run weekly pipeline
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check database connectivity
        run: |
          python - <<'EOF'
          import sys
          from sqlalchemy import create_engine, text
          from app.config import settings

          if not settings.database_url or settings.database_url.startswith("postgresql://user:password"):
              print("ERROR: DATABASE_URL secret is not configured.")
              sys.exit(1)

          try:
              engine = create_engine(settings.database_url)
              with engine.connect() as conn:
                  conn.execute(text("SELECT 1"))
              print("Database connection OK.")
          except Exception as e:
              print(f"ERROR: Could not connect to the database: {e}")
              sys.exit(1)
          EOF

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run weekly pipeline
        run: python scripts/run_pipeline.py
