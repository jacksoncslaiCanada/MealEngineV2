name: "[One-time] Phase 3 API Live Smoke Test"

# REMINDER: Delete this workflow once it passes cleanly.
#
# Starts the FastAPI app against the real database and runs live HTTP checks
# against all Phase 3 endpoints, including multi-ingredient recipe search.
#
# Read-only — no data is written or deleted.
#
# Required secrets:
#   DATABASE_URL — PostgreSQL connection string

on:
  workflow_dispatch:

jobs:
  api-smoke-test:
    name: Run Phase 3 API smoke test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check database connectivity
        run: |
          python - <<'EOF'
          import sys
          from sqlalchemy import create_engine, text
          from app.config import settings

          if not settings.database_url or settings.database_url.startswith("postgresql://user:password"):
              print("ERROR: DATABASE_URL secret is not configured.")
              sys.exit(1)

          try:
              engine = create_engine(settings.database_url)
              with engine.connect() as conn:
                  conn.execute(text("SELECT 1"))
              print("Database connection OK.")
          except Exception as e:
              print(f"ERROR: Could not connect to the database: {e}")
              sys.exit(1)
          EOF

      - name: Run API smoke test
        id: smoke
        continue-on-error: true
        run: python scripts/api_smoke_test.py

      - name: Write job summary
        if: always()
        run: |
          if [ -f api_smoke_test_report.md ]; then
            cat api_smoke_test_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Smoke test did not produce a report (script may have crashed)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-test-report
          path: api_smoke_test_report.md
          if-no-files-found: warn

      - name: Check result
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "One or more API smoke test checks failed. See the job summary above."
          exit 1
